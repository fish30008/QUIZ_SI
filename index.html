<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedded Systems Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #5cffb0;
    --accent-dim: rgba(92,255,176,0.12);
    --accent-mid: rgba(92,255,176,0.25);
    --danger: #ff5c7a;
    --danger-dim: rgba(255,92,122,0.12);
    --text-1: #f0f2f7;
    --text-2: #8b909e;
    --text-3: #555b6b;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --display: 'Syne', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(92,255,176,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(92,255,176,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(92,255,176,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  .site-header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.5s ease both;
  }

  .site-header .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .site-header h1 {
    font-family: var(--display);
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    color: var(--text-1);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .site-header h1 span { color: var(--accent); }

  .site-header p {
    font-size: 14px;
    color: var(--text-2);
    margin-top: 10px;
    font-weight: 300;
  }

  #start-screen { animation: fadeUp 0.4s ease both; }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .mode-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .mode-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-dim);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .mode-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .mode-card:hover::before { opacity: 1; }

  .mode-card.active {
    border-color: var(--accent);
    background: var(--bg3);
  }
  .mode-card.active::before { opacity: 1; }

  .mode-icon { font-size: 24px; margin-bottom: 8px; }

  .mode-title {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 700;
    color: var(--text-1);
    margin-bottom: 4px;
  }

  .mode-desc { font-size: 12px; color: var(--text-2); }
  .mode-card.active .mode-title { color: var(--accent); }

  .start-btn, .reset-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius-lg);
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .start-btn {
    background: var(--accent);
    color: #0d0f14;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border-hover);
    color: var(--text-2);
    font-size: 14px;
    font-weight: 500;
  }
  .reset-btn:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-dim); }

  .start-btn::after, .reset-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .start-btn:hover { transform: translateY(-1px); }
  .start-btn:hover::after { opacity: 1; }
  .start-btn:active { transform: scale(0.99); }

  #quiz-screen { display: none; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    animation: fadeDown 0.3s ease both;
  }

  .q-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: 0.08em;
  }

  .score-badge {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 12px;
    background: var(--accent-dim);
    border: 1px solid rgba(92,255,176,0.2);
    border-radius: 99px;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .progress-wrap {
    height: 3px;
    background: var(--bg3);
    border-radius: 99px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    animation: fadeDown 0.3s ease both 0.05s;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(92,255,176,0.5);
  }

  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.3s ease both;
    position: relative;
  }

  .q-number {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .mark-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-3);
    border-radius: var(--radius);
    font-size: 18px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .mark-btn:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-dim); }

  .mark-btn.marked {
    border-color: var(--accent);
    color: #0d0f14;
    background: var(--accent);
  }

  .mark-label {
    position: absolute;
    top: 1.25rem;
    right: 3rem;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .mark-btn.marked + .mark-label { opacity: 1; color: var(--accent); }

  .q-text {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 600;
    color: var(--text-1);
    line-height: 1.45;
    margin-bottom: 1.5rem;
    letter-spacing: -0.01em;
    padding-right: 40px;
  }

  .options { display: flex; flex-direction: column; gap: 8px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-1);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--border-hover);
    background: #1e2230;
    transform: translateX(2px);
  }
  .option-btn:disabled { cursor: default; }

  .opt-key {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    min-width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-3);
    background: var(--bg2);
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    margin-top: 1px;
  }

  .option-btn:hover:not(:disabled) .opt-key { border-color: var(--border-hover); color: var(--text-2); }

  .option-btn.correct { background: rgba(92,255,176,0.08); border-color: rgba(92,255,176,0.4); }
  .option-btn.correct .opt-key { background: var(--accent); border-color: var(--accent); color: #0d0f14; }
  .option-btn.correct .opt-text { color: var(--accent); }

  .option-btn.wrong { background: rgba(255,92,122,0.08); border-color: rgba(255,92,122,0.4); }
  .option-btn.wrong .opt-key { background: var(--danger); border-color: var(--danger); color: #0d0f14; }
  .option-btn.wrong .opt-text { color: var(--danger); }

  .feedback {
    margin-top: 1rem;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: var(--mono);
    display: none;
  }

  .feedback.show { display: block; }

  .feedback.correct {
    background: rgba(92,255,176,0.08);
    border: 1px solid rgba(92,255,176,0.2);
    color: var(--accent);
  }

  .feedback.wrong {
    background: rgba(255,92,122,0.08);
    border: 1px solid rgba(255,92,122,0.2);
    color: var(--danger);
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    animation: fadeUp 0.3s ease both 0.1s;
  }

  .nav-btn {
    flex: 1;
    padding: 12px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-1);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s, opacity 0.2s;
  }

  .nav-btn:hover:not(:disabled) { border-color: var(--border-hover); background: var(--bg3); transform: translateY(-1px); }
  .nav-btn:active:not(:disabled) { transform: scale(0.99); }
  .nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }

  .nav-btn.primary {
    background: var(--accent-dim);
    border-color: rgba(92,255,176,0.25);
    color: var(--accent);
  }
  .nav-btn.primary:hover:not(:disabled) { background: rgba(92,255,176,0.18); border-color: rgba(92,255,176,0.4); }

  #results-screen { display: none; animation: fadeUp 0.4s ease both; }

  .results-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    text-align: center;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .results-card::before {
    content: '';
    position: absolute;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(92,255,176,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .result-grade {
    font-family: var(--display);
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .result-pct {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-2);
    margin-bottom: 1.5rem;
    letter-spacing: 0.06em;
  }

  .result-msg { font-family: var(--display); font-size: 22px; font-weight: 700; color: var(--text-1); margin-bottom: 0.4rem; }
  .result-sub { font-size: 14px; color: var(--text-2); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 2rem;
  }

  .stat-box { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 10px; }
  .stat-val { font-family: var(--display); font-size: 26px; font-weight: 700; margin-bottom: 2px; }
  .stat-val.good { color: var(--accent); }
  .stat-val.bad { color: var(--danger); }
  .stat-val.neutral { color: var(--text-1); }
  .stat-lbl { font-family: var(--mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; }

  .results-actions { display: flex; gap: 10px; }
  .results-actions .nav-btn { font-family: var(--display); font-weight: 600; }
  .results-actions .nav-btn.primary { font-size: 15px; padding: 14px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to   { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-8px); } to   { opacity: 1; transform: translateY(0); } }

  @media (max-width: 500px) {
    .mode-grid { grid-template-columns: 1fr; }
    .q-text { font-size: 16px; }
    .result-grade { font-size: 64px; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="container">

  <header class="site-header">
    <div class="eyebrow">UTM · Embedded Systems</div>
    <h1>Systems <span>Quiz</span></h1>
    <p>Test your knowledge across sensors, actuators, control, communication & more</p>
  </header>

  <!-- Start screen -->
  <div id="start-screen">
    <div class="mode-grid">
      <div class="mode-card active" data-mode="all" onclick="setMode(this,'all')">
        <div class="mode-icon">📚</div>
        <div class="mode-title">Full</div>
        <div class="mode-desc">All questions</div>
      </div>
      <div class="mode-card" data-mode="25" onclick="setMode(this,'25')">
        <div class="mode-icon">⚡</div>
        <div class="mode-title">Medium</div>
        <div class="mode-desc">25 questions</div>
      </div>
      <div class="mode-card" data-mode="10" onclick="setMode(this,'10')">
        <div class="mode-icon">🎯</div>
        <div class="mode-title">Quick</div>
        <div class="mode-desc">10 questions</div>
      </div>
    </div>
    <p id="remaining-info" style="font-size:12px; color:var(--text-2); text-align:center; margin-bottom:10px;"></p>
    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>Loading questions…</button>
    <button class="reset-btn" onclick="resetKnown()">♻ Reset known questions</button>
  </div>

  <!-- Quiz screen -->
  <div id="quiz-screen">
    <div class="top-bar">
      <span class="q-label" id="q-label">Question 1 / 10</span>
      <span class="score-badge" id="score-badge">Score: 0</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="q-card">
      <div class="q-number" id="q-number">Q01</div>
      <button class="mark-btn" id="mark-btn" onclick="toggleMark()" title="Mark as known">★</button>
      <span class="mark-label">Known</span>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="prevQ()">← Prev</button>
      <button class="nav-btn primary" id="btn-next" onclick="nextQ()" disabled>Next →</button>
    </div>
  </div>

  <!-- Results screen -->
  <div id="results-screen">
    <div class="results-card">
      <div class="result-grade" id="result-grade">–</div>
      <div class="result-pct" id="result-pct"></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="result-sub" id="result-sub"></div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-val good" id="stat-correct">0</div><div class="stat-lbl">Correct</div></div>
        <div class="stat-box"><div class="stat-val bad" id="stat-wrong">0</div><div class="stat-lbl">Wrong</div></div>
        <div class="stat-box"><div class="stat-val neutral" id="stat-total">0</div><div class="stat-lbl">Total</div></div>
      </div>
    </div>
    <div class="results-actions">
      <button class="nav-btn" onclick="showStart()">Change mode</button>
      <button class="nav-btn primary" onclick="startQuiz()">Try again →</button>
    </div>
  </div>

</div>

<script>
// ---------- data loading ----------
let ALL_QUESTIONS = [];
const KNOWN_KEY = 'embedded_quiz_known';

function getKnownSet() {
  try { return new Set(JSON.parse(localStorage.getItem(KNOWN_KEY) || '[]')); } catch(e) { return new Set(); }
}
function saveKnownSet(set) {
  localStorage.setItem(KNOWN_KEY, JSON.stringify([...set]));
}
function resetKnown() {
  if(confirm('Remove all known marks? All 100 questions will be available again.')) {
    localStorage.removeItem(KNOWN_KEY);
    refreshStartInfo();
  }
}

async function loadQuestions() {
  try {
    const res = await fetch('questions.json');
    if(!res.ok) throw new Error('Network error');
    ALL_QUESTIONS = await res.json();
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = 'Start Quiz →';
    refreshStartInfo();
  } catch(e) {
    document.getElementById('start-btn').textContent = 'Error loading questions';
  }
}

function refreshStartInfo() {
  const known = getKnownSet();
  const avail = ALL_QUESTIONS.length - known.size;
  document.getElementById('remaining-info').textContent =
    avail === 0 ? 'All questions are marked as known. Reset to see them again.' : `${avail} questions available (${known.size} marked known)`;
}

// ---------- quiz state ----------
let selectedMode = 'all';
let questions = [];         // filtered & shuffled subset for current session
let current = 0;
let answered = null;
let score = 0;

function setMode(el, mode) {
  selectedMode = mode;
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function shuffle(arr) {
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const known = getKnownSet();
  const pool = ALL_QUESTIONS.filter(q => !known.has(q.id));
  if(pool.length === 0) {
    alert('No questions available! All are marked known. Reset the list first.');
    return;
  }

  const count = selectedMode==='10'?10:selectedMode==='25'?25:pool.length;
  const selected = shuffle(pool).slice(0, count);

  // build question objects with shuffled options (keeping original answer mapping)
  questions = selected.map(q => {
    const indexed = q.opts.map((text, idx) => ({ text, orig: idx }));
    const shuffledOpts = shuffle([...indexed]);
    const newAnswer = shuffledOpts.findIndex(o => o.orig === q.a);
    return {
      id: q.id,
      q: q.q,
      opts: shuffledOpts,
      a: newAnswer      // index in the shuffled array
    };
  });

  current = 0; answered = null; score = 0;
  show('quiz-screen');
  renderQ();
}

function renderQ() {
  const q = questions[current];
  const total = questions.length;
  const known = getKnownSet();
  const isMarked = known.has(q.id);

  document.getElementById('q-label').textContent = `Question ${current+1} / ${total}`;
  document.getElementById('score-badge').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(current/total)*100}%`;
  document.getElementById('q-number').textContent = `Q${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.q;

  // mark button state
  const markBtn = document.getElementById('mark-btn');
  if(isMarked) {
    markBtn.classList.add('marked');
    markBtn.innerHTML = '★';
  } else {
    markBtn.classList.remove('marked');
    markBtn.innerHTML = '☆';
  }

  const opts = document.getElementById('options');
  const keys = ['A','B','C','D'];
  opts.innerHTML = q.opts.map((opt,i) => `
    <button class="option-btn" onclick="answer(${i})">
      <span class="opt-key">${keys[i]}</span>
      <span class="opt-text">${opt.text}</span>
    </button>
  `).join('');

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-next').textContent = current === total-1 ? 'Finish ✓' : 'Next →';
  answered = null;
}

function answer(i) {
  if(answered !== null) return;
  answered = i;
  const q = questions[current];
  const isCorrect = (i === q.a);
  if(isCorrect) score++;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, idx) => {
    btn.disabled = true;
    if(idx === q.a) btn.classList.add('correct');
    else if(idx === i) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
  fb.textContent = isCorrect ? '✓ Correct!' : '✗ Incorrect — correct answer is highlighted.';

  document.getElementById('btn-next').disabled = false;
  document.getElementById('score-badge').textContent = `Score: ${score}`;
}

function toggleMark() {
  if(!questions.length) return;
  const qid = questions[current].id;
  const known = getKnownSet();
  if(known.has(qid)) {
    known.delete(qid);
  } else {
    known.add(qid);
  }
  saveKnownSet(known);
  renderQ();   // refresh mark icon
  refreshStartInfo();
}

function nextQ() {
  if(answered === null) return;
  if(current === questions.length - 1) {
    showResults();
    return;
  }
  current++;
  answered = null;
  renderQ();
}

function prevQ() {
  if(current === 0) return;
  current--;
  answered = null;
  renderQ();
}

function showResults() {
  const total = questions.length;
  const pct = Math.round((score/total)*100);
  let grade, msg;
  if(pct >= 90) { grade='A'; msg='Outstanding!'; }
  else if(pct >= 75) { grade='B'; msg='Great work!'; }
  else if(pct >= 60) { grade='C'; msg='Good effort!'; }
  else if(pct >= 40) { grade='D'; msg='Keep studying!'; }
  else { grade='F'; msg='Back to the books!'; }

  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-pct').textContent = `${pct}% — ${score} of ${total} correct`;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-sub').textContent = `You answered ${score} questions correctly out of ${total}.`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = total - score;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('progress-fill').style.width = '100%';

  show('results-screen');
}

function show(id) {
  ['start-screen','quiz-screen','results-screen'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
}

function showStart() {
  show('start-screen');
  refreshStartInfo();
}

// on page load
loadQuestions();
</script>
</body>
</html>
